<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short course</title>

<style>
  body{
    font-family: "Khmer OS Battambang", Arial, sans-serif;
    background:#eee;
    margin:0;
    padding:20px;
  }

  h1{
    text-align:center;
    margin-bottom:20px;
  }

  .card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    margin:18px auto;
    max-width:520px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
  }

  .question{
    font-weight:bold;
    margin-bottom:12px;
  }

  label{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    cursor:pointer;
  }

  .other-input{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-top:8px;
  }

  button{
    display:block;
    margin:25px auto;
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:16px;
    cursor:pointer;
  }
</style>
</head>

<body>



<!-- Question 1 -->
<div class="card">
  <div class="question">សូមជ្រើសរើសភេទរបស់អ្នក</div>

  <label>
    <input type="radio" name="gender"> ប្រុស
  </label>

  <label>
    <input type="radio" name="gender"> ស្រី
  </label>

  <label>
    <input type="radio" name="gender"> ផ្សេងៗ
  </label>
</div>

<!-- Question 2 -->
<div class="card">
  <div class="question">តើអ្នកចង់រៀនរយៈពេលប៉ុន្មាន?</div>

  <label>
    <input type="radio" name="time"> 1 ខែ
  </label>

  <label>
    <input type="radio" name="time"> 3 ខែ
  </label>

  <label>
    <input type="radio" name="time"> 5 ខែ
  </label>

  <label>
    <input type="radio" name="time"> ផ្សេងៗ
  </label>

 
</div>

<!-- Question 3 -->
<div class="card">
  <div class="question">សូមជ្រើសរើសម៉ោងសិក្សា (ចុងសប្តាហ៍)</div>

  <label>
    <input type="radio" name="schedule">
    9:30–10:30 ព្រឹក
  </label>

  <label>
    <input type="radio" name="schedule">
    10:40–11:40 ព្រឹក
  </label>

  <label>
    <input type="radio" name="schedule">
    ផ្សេងៗ
  </label>

  
</div>

<button>Submit</button>

</body>
</html>
